
<svg width="400" height="60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad_Full Stack Dev" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="transparent" />
  <text x="0" y="20" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Full Stack Dev</text>
  <rect x="0" y="30" width="100%" height="10" rx="5" fill="#333" />
  <rect x="0" y="30" height="10" rx="5" fill="url(#grad_Full Stack Dev)">
    <animate attributeName="width" from="0" to="92%" dur="2s" fill="freeze" />
  </rect>
  <text x="92%" y="55" fill="#764ba2" font-family="Arial, sans-serif" font-size="12" text-anchor="end">92%</text>
</svg>
